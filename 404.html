<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3; url=https://portfolio.deboston.space/">
  <link rel="canonical" href="https://portfolio.deboston.space/">
  <title>Joël TCHINDA — Redirection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0, 180, 255, 0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(120, 60, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00b4ff, #7b3cff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 1.25rem;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 2rem;
    }

    .message {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 0.6rem;
      line-height: 1.6;
    }

    .progress-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin: 1.5rem 0 2rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00b4ff, #7b3cff);
      border-radius: 99px;
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #00b4ff, #7b3cff);
      color: #fff;
      text-decoration: none;
      border-radius: 99px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(0, 180, 255, 0.25);
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .note {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">JT</div>
    <h1>Joël TCHINDA</h1>
    <p class="subtitle">Portfolio · Ingénierie Informatique &amp; Data</p>

    <p class="message">Cette page a été déplacée.<br>Vous allez être redirigé automatiquement vers le nouveau portfolio…</p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <a class="btn" href="https://portfolio.deboston.space/">Accéder au nouveau portfolio</a>
    <p class="note">Redirection automatique dans 3 secondes</p>
  </div>

  <script>
    setTimeout(function () {
      window.location.replace("https://portfolio.deboston.space/");
    }, 3000);
  </script>
</body>
</html>
